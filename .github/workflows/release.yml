name: Release CI - Pathetic

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build_test_and_release:
    name: Build, Test, Create Release, and Set Notes
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        id: build_test
        continue-on-error: true
        run: |
          echo "Building and testing with Maven..."
          mvn clean install -U
          EXIT_CODE=$?
          echo "Maven exit code: $EXIT_CODE"
          # wir brechen hier ab mit dem gleichen Exit-Code,
          # damit steps.build_test.conclusion korrekt auf 'failure' springt
          exit $EXIT_CODE


      - name: Read CHANGELOG.md Content
        id: read_manual_changelog
        run: |
          CHANGELOG_SOURCE_FILE="CHANGELOG.md"
          if [ -f "${CHANGELOG_SOURCE_FILE}" ]; then
          CHANGELOG_CONTENT=$(cat "${CHANGELOG_SOURCE_FILE}" 2>/dev/null)
          else
          CHANGELOG_CONTENT="### Changelog für ${{ github.ref_name }}\n\n*${CHANGELOG_SOURCE_FILE} nicht gefunden oder leer.*"
          echo "## Changelog\n\n### Added\n\n### Changed\n\n### Fixed\n\n### Removed\n" > "${CHANGELOG_SOURCE_FILE}"
          fi

          # Build/Test Status auswerten
          if [ "${{ steps.build_test.outcome }}" = "success" ]; then
          BUILD_BADGE="![Build Success](https://img.shields.io/badge/Build-Success-brightgreen)"
          TEST_BADGE="![Tests Succeeded](https://img.shields.io/badge/Tests-Succeeded-brightgreen)"
          else
          BUILD_BADGE="![Build Failed](https://img.shields.io/badge/Build-Failed-red)"
          TEST_BADGE="![Tests Failed](https://img.shields.io/badge/Tests-Failed-red)"
          fi

          STATUS_BADGES="${BUILD_BADGE} ${TEST_BADGE}\n\n"
          CHANGELOG_CONTENT="${STATUS_BADGES}${CHANGELOG_CONTENT}"

          # Escape für multiline string
          CHANGELOG_CONTENT="${CHANGELOG_CONTENT//'%'/'%25'}"
          CHANGELOG_CONTENT="${CHANGELOG_CONTENT//$'\n'/'%0A'}"
          CHANGELOG_CONTENT="${CHANGELOG_CONTENT//$'\r'/'%0D'}"
          echo "changelog_text=${CHANGELOG_CONTENT}" >> $GITHUB_OUTPUT

          # Debug-Ausgabe
          echo "--- Inhalt von ${CHANGELOG_SOURCE_FILE} (mit Badges) ---"
          echo -e "${STATUS_BADGES}"
          echo -e "${CHANGELOG_CONTENT//%0A/\\n}"
          echo "-----------------------------------------"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.read_manual_changelog.outputs.changelog_text }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach CHANGELOG.md as Release Asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [ -f "CHANGELOG.md" ]; then
            echo "Attaching CHANGELOG.md to release ${TAG_NAME}..."
            gh release upload "${TAG_NAME}" CHANGELOG.md --clobber
            echo "CHANGELOG.md has been attached to release ${TAG_NAME}."
          else
            echo "CHANGELOG.md not found, could not attach as asset."
          fi

      - name: Clear and Commit CHANGELOG.md for next release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TARGET_BRANCH="${DEFAULT_BRANCH}"
          if [ -z "$TARGET_BRANCH" ]; then
            echo "Warning: Default branch could not be determined automatically. Using 'main' as fallback."
            TARGET_BRANCH="main" 
          fi
          echo "Target branch for clearing the changelog: ${TARGET_BRANCH}"

          CURRENT_GIT_STATE=$(git rev-parse --abbrev-ref HEAD)
          if [[ "${CURRENT_GIT_STATE}" == "HEAD" ]]; then 
            echo "In detached HEAD state. Checking out branch ${TARGET_BRANCH}."
            if ! git show-ref --verify --quiet "refs/heads/${TARGET_BRANCH}"; then
                echo "Local branch ${TARGET_BRANCH} does not exist. Trying to fetch and track remote branch."
                git fetch origin "${TARGET_BRANCH}:${TARGET_BRANCH}" || (echo "Error fetching origin/${TARGET_BRANCH}" && exit 1)
            fi
            git checkout "${TARGET_BRANCH}"
          elif [[ "${CURRENT_GIT_STATE}" != "${TARGET_BRANCH}" ]]; then
            echo "Switching from ${CURRENT_GIT_STATE} to ${TARGET_BRANCH}."
            git checkout "${TARGET_BRANCH}"
          fi

          echo "Updating local branch ${TARGET_BRANCH}..."
          git pull origin "${TARGET_BRANCH}" --ff-only

          CHANGELOG_FILE_TO_CLEAR="CHANGELOG.md"
          if [ -f "${CHANGELOG_FILE_TO_CLEAR}" ]; then
            echo -e "## Changelog\n\n### Added\n\n### Changed\n\n### Fixed\n\n### Removed\n" > "${CHANGELOG_FILE_TO_CLEAR}"
            echo "CHANGELOG.md has been reset with the template for the next release."

            git add "${CHANGELOG_FILE_TO_CLEAR}"
            if ! git diff --staged --quiet; then
              git commit -m "chore: Reset ${CHANGELOG_FILE_TO_CLEAR} for next release [skip ci]"
              git push origin "${TARGET_BRANCH}"
              echo "${CHANGELOG_FILE_TO_CLEAR} has been cleared and changes pushed to branch ${TARGET_BRANCH}."
            else
              echo "${CHANGELOG_FILE_TO_CLEAR} was not changed (was already in template state)."
            fi
          else
            echo "ERROR: ${CHANGELOG_FILE_TO_CLEAR} not found, cannot be cleared/reset."
          fi
