name: Deploy Javadoc

on:
  push:
    branches: [ production ]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # 1) Build aggregated Javadoc -> docs/apidocs
      - name: Build aggregated Javadoc
        run: mvn -B -DskipTests javadoc:aggregate -Dmaven.javadoc.failOnError=false

      # 2) Root-Redirect anlegen (docs/index.html) – und CNAME sicherstellen
      - name: Create root redirect and CNAME
        run: |
          mkdir -p docs
          cat > docs/index.html <<'HTML'
          <!doctype html><meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=./apidocs/">
          <link rel="canonical" href="./apidocs/">
          <title>Redirecting…</title>
          <script>location.replace("./apidocs/");</script>
          Redirecting to <a href="./apidocs/">API docs</a> …
          HTML

      # 3) Alles unter docs/ auf den javadoc-Branch veröffentlichen
      - name: Deploy to GitHub Pages (javadoc branch)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: javadoc
          publish_dir: docs
          # optional: true, wenn du ältere Dateien erhalten willst
          keep_files: false