name: Publish Javadoc
on:
  push:
    branches: [ production ]
    paths:
      - '**/*.java'
      - '**/pom.xml'
      - '.github/workflows/javadocs.yml'
  workflow_dispatch: { }

jobs:
  javadoc:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # Baut Aggregat-Javadoc in target/site/apidocs
      - name: Build aggregated Javadoc
        run: mvn -B -DskipTests javadoc:aggregate -Dmaven.javadoc.failOnError=false

      # In Root publishen (kein /apidocs), CNAME + .nojekyll dazu
      - name: Prepare publish folder
        run: |
          mkdir -p publish
          rsync -a --delete target/site/apidocs/ publish/
          echo "docs.pathetic.site" > publish/CNAME
          touch publish/.nojekyll

      - name: Deploy to javadoc branch (root)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: publish
          publish_branch: javadoc